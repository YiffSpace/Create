name: Test
permissions:
    contents: read
on: [push, pull_request, workflow_call]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
            - run: pnpm i --frozen-lockfile --ignore-scripts
            - run: pnpm run test
