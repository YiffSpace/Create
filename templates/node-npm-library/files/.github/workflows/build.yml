name: Build Code
permissions:
    contents: read
on: [push, pull_request, workflow_call]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .node-version
                  cache: npm
                  registry-url: https://registry.npmjs.org/
            - run: npm ci
            - run: npm run build
